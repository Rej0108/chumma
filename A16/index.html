<!DOCTYPE html>
<html>
<head>
<title>Choose Your Love ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #1a001a, #330033, #660033);
    font-family: 'Dancing Script', cursive;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    color: #ff4d6d;
    text-shadow: 0 0 15px #ff4d6d;
}

button {
    display: block;
    margin: 15px auto;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px #ff4d6d;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#response {
    margin-top: 20px;
    font-size: 20px;
    color: pink;
    text-shadow: 0 0 10px pink;
    opacity: 0;
    transition: 0.5s;
}

#finalLove {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 55px;
    color: #ff4d6d;
    text-shadow: 0 0 30px #ff4d6d, 0 0 60px pink;
    z-index: 10;
    transition: 0.5s;
}

#gfName {
    position: fixed;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 45px;
    color: white;
    text-shadow: 0 0 20px pink, 0 0 40px #ff4d6d;
    z-index: 10;
    transition: 0.5s;
}

#heartCanvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="container" id="mainUI">
    <h1>Choose Your Love ❤️</h1>

    <button onclick="handleClick(1)">How much I love you? 😏</button>
    <button onclick="handleClick(2)">Unna evlo miss pannuren theriyuma? 🥺</button>
    <button onclick="handleClick(3)">Press if you love me ❤️</button>

    <div id="response"></div>
</div>

<div id="finalLove">I LOVE YOU ❤️</div>
<div id="gfName">Ammuuuuuuuuu i miss you</div>

<audio id="bgm" loop>
    <source src="Pookal Pookum Tharunam Flute.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<canvas id="canvas"></canvas>
<canvas id="heartCanvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const heartCanvas = document.getElementById("heartCanvas");
const hctx = heartCanvas.getContext("2d");

canvas.width = heartCanvas.width = window.innerWidth;
canvas.height = heartCanvas.height = window.innerHeight;

let particles = [];
let fireworks = [];
let nameParticles = [];
let fallingSparkles = [];
let showNameHeart = false;

// ✨ SPARKLES
for (let i = 0; i < 80; i++) {
    fallingSparkles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        speed: Math.random() * 2 + 1,
        size: Math.random() * 2 + 1
    });
}

// 💥 HEART BURST
function burstHearts(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*6,
            vy: (Math.random()-0.5)*6,
            size: Math.random()*20+10,
            life: 60
        });
    }
}

// 🎆 FIREWORK
function createFirework() {
    for (let i = 0; i < 100; i++) {
        fireworks.push({
            x: canvas.width/2,
            y: canvas.height/2,
            vx: (Math.random()-0.5)*8,
            vy: (Math.random()-0.5)*8,
            life: 80
        });
    }
}

// 💖 HEART SHAPE
function heartShape(t){
    return {
        x: 16*Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

// 💞 NAME HEART
function createNameHeart(){
    nameParticles=[];
    for(let i=0;i<1200;i++){
        let t=Math.random()*Math.PI*2;
        let pos=heartShape(t);

        nameParticles.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            tx: canvas.width/2 + pos.x*12,
            ty: canvas.height/2 + pos.y*12,
            speed: Math.random()*0.04+0.02
        });
    }
    showNameHeart=true;
}

function animateHeartName(){
    if(!showNameHeart) return;

    hctx.clearRect(0,0,heartCanvas.width,heartCanvas.height);

    nameParticles.forEach(p=>{
        p.x += (p.tx-p.x)*p.speed;
        p.y += (p.ty-p.y)*p.speed;

        hctx.fillStyle="pink";
        hctx.shadowBlur=20;
        hctx.shadowColor="pink";
        hctx.fillRect(p.x,p.y,2,2);
    });

    requestAnimationFrame(animateHeartName);
}

let clickCount=0;
let musicStarted=false;

// 🎯 CLICK
function handleClick(type){
    clickCount++;

    document.getElementById("clickSound").currentTime=0;
    document.getElementById("clickSound").play();

    if(!musicStarted){
        let audio=document.getElementById("bgm");
        audio.muted=true;
        audio.play().then(()=>{audio.muted=false;}).catch(()=>{});
        musicStarted=true;
    }

    let text="";
    if(type===1){
        text="More than words… more than everything… I love you endlessly ❤️";
    }else if(type===2){
        text="Every second… every day… didn't even had a single day without your thought I'm missing you so much ammu 🥺❤️";
    }else{
        text="I knew it 😏 You love me… but I love you more and more and more till the end of my life love you lot ammuuu 💖🔥";
    }

    let res=document.getElementById("response");
    res.innerHTML=text;
    res.style.opacity=1;

    burstHearts(Math.random()*canvas.width,Math.random()*canvas.height);

    if(clickCount>=3){
        setTimeout(()=>{
            document.getElementById("finalLove").style.transform="translate(-50%, -50%) scale(1)";
            document.getElementById("mainUI").style.display="none";

            setTimeout(()=>{
                document.getElementById("gfName").style.transform="translate(-50%, -50%) scale(1)";
                createFirework();
                createNameHeart();
                animateHeartName();
            },800);

        },2000);
    }
}

// 🎨 ANIMATION
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ✨ SPARKLES RAIN
    fallingSparkles.forEach(s=>{
        ctx.fillStyle="white";
        ctx.shadowBlur=10;
        ctx.shadowColor="white";

        ctx.fillRect(s.x,s.y,s.size,s.size);

        s.y+=s.speed;

        if(s.y>canvas.height){
            s.y=-10;
            s.x=Math.random()*canvas.width;
        }
    });

    // ❤️ HEART BURST
    particles.forEach((p,i)=>{
        ctx.font=p.size+"px Arial";
        ctx.fillText("❤️",p.x,p.y);
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
        if(p.life<=0) particles.splice(i,1);
    });

    // 🎆 FIREWORKS
    fireworks.forEach((f,i)=>{
        ctx.fillStyle="orange";
        ctx.fillRect(f.x,f.y,3,3);
        f.x+=f.vx;
        f.y+=f.vy;
        f.life--;
        if(f.life<=0) fireworks.splice(i,1);
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
